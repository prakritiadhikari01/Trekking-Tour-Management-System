<!DOCTYPE html>
<html>
<head>
    <title>Choose Package</title>
</head>
<body>

<h1>Choose Package</h1>

{% for package in packages %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>{{ package.title }}</h3>
        <p>{{ package.description }}</p>

        <a href="{% url 'bookings:create_booking' slug=package.slug %}">
            Book Now
        </a>
    </div>
{% empty %}
    <p>No packages found in database</p>
{% endfor %}

</body>
</html>
