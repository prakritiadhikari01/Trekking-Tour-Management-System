services:
  docs:
    image: trekking_and_tour_management_system_local_docs
    container_name: trekking_and_tour_management_system_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./trekking_and_tour_management_system:/app/trekking_and_tour_management_system:z
    ports:
      - '9000:9000'
    command: /start-docs
