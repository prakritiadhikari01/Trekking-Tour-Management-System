{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <h2>
        My Bookings
    </h2>

    {% for booking in bookings %}

        <div class="card mb-3 p-3">

            <h4>
                {{ booking.package.title }}
            </h4>

            <p>
                Status:
                {{ booking.booking_status }}
            </p>

            <p>
                Total Price:
                Rs. {{ booking.total_price }}
            </p>

        </div>

    {% endfor %}

</div>

{% endblock %}
